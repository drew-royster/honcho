name: honcho-codex

services:
  api:
    container_name: honcho_api
    image: honcho-codex:latest
    build:
      context: ${HONCHO_SOURCE_DIR}
      dockerfile: Dockerfile
    entrypoint: ["sh", "/app/docker/entrypoint.sh"]
    restart: unless-stopped
    depends_on:
      embeddings:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${HONCHO_API_PORT}:8000"
    env_file:
      - .env
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://postgres:${HONCHO_DB_PASSWORD}@postgres:5432/postgres
      CACHE_URL: redis://redis:6379/0?suppress=true
    volumes:
      - ${HONCHO_CODEX_DIR}:/config/codex
      - /etc/localtime:/etc/localtime:ro

  deriver:
    container_name: honcho_deriver
    image: honcho-codex:latest
    build:
      context: ${HONCHO_SOURCE_DIR}
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      embeddings:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://postgres:${HONCHO_DB_PASSWORD}@postgres:5432/postgres
      CACHE_URL: redis://redis:6379/0?suppress=true
      DERIVER_FLUSH_ENABLED: ${DERIVER_FLUSH_ENABLED:-true}
    command: ["/app/.venv/bin/python", "-m", "src.deriver"]
    volumes:
      - ${HONCHO_CODEX_DIR}:/config/codex
      - /etc/localtime:/etc/localtime:ro

  embeddings:
    container_name: honcho_embeddings
    image: ollama/ollama:latest
    restart: unless-stopped
    gpus: all
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        OLLAMA_HOST=0.0.0.0:${HONCHO_EMBEDDINGS_PORT} ollama serve &
        pid=$$!;
        until OLLAMA_HOST=127.0.0.1:${HONCHO_EMBEDDINGS_PORT} ollama list >/dev/null 2>&1; do sleep 1; done;
        OLLAMA_HOST=127.0.0.1:${HONCHO_EMBEDDINGS_PORT} ollama pull ${HONCHO_EMBEDDINGS_MODEL};
        wait $$pid
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${HONCHO_EMBEDDINGS_CACHE}:/root/.ollama
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "OLLAMA_HOST=127.0.0.1:${HONCHO_EMBEDDINGS_PORT} ollama show ${HONCHO_EMBEDDINGS_MODEL} >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 60

  postgres:
    container_name: honcho_postgres
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${HONCHO_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${HONCHO_DB_DATA}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    container_name: honcho_redis
    image: redis:8.2
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${HONCHO_REDIS_DATA}:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 12
